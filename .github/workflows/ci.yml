# Build check for XFB.
# Mirrors Dockerfile.debian-build — the exact recipe that produces the release
# .deb packages — so a green run here means the release path compiles.
name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Qt 6, CMake)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            qt6-base-dev \
            qt6-multimedia-dev \
            qt6-webengine-dev \
            qt6-webengine-dev-tools \
            qt6-declarative-dev \
            qt6-positioning-dev \
            qt6-webchannel-dev \
            qt6-quick3d-dev \
            libqt6opengl6-dev \
            libqt6sql6-sqlite \
            libqt6concurrent6 \
            qml6-module-qtquick \
            qml6-module-qtwebengine \
            libgl1-mesa-dev \
            libatspi2.0-dev \
            libspeechd-dev \
            libasound2-dev \
            libpulse-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --target XFB --parallel
